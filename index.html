<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="landscape" />
  <title>Glider Gauntlet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060618;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
    }
    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
    /* Portrait warning overlay */
    #rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #060618;
      color: #00ffff;
      font-family: monospace;
      font-size: 22px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 20px;
    }
    #rotate-message .icon { font-size: 48px; }
    #rotate-message .sub { font-size: 14px; color: #446666; margin-top: 8px; }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-message { display: flex; }
    }
    /* Fullscreen button for mobile */
    #fs-btn {
      display: none;
      position: fixed;
      top: 8px; right: 8px;
      z-index: 9999;
      background: rgba(0, 255, 255, 0.15);
      border: 1px solid rgba(0, 255, 255, 0.4);
      color: #00ffff;
      font-family: monospace;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }
    @media (hover: none) and (pointer: coarse) {
      #fs-btn { display: block; }
    }
  </style>
</head>
<body>
  <div id="rotate-message">
    <div class="icon">📱↔️</div>
    <div>Rotate your device to landscape</div>
    <div class="sub">Then tap anywhere to play</div>
  </div>
  <button id="fs-btn">⛶ Fullscreen</button>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Fullscreen button (reliable because it's a direct click handler on a button)
    var fsBtn = document.getElementById('fs-btn');
    fsBtn.addEventListener('click', function() {
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(){});
      }
      fsBtn.style.display = 'none';
    });
    // Hide button if already fullscreen
    document.addEventListener('fullscreenchange', function() {
      if (document.fullscreenElement) fsBtn.style.display = 'none';
      else if ('ontouchstart' in window) fsBtn.style.display = 'block';
    });
  </script>
</body>
</html>
