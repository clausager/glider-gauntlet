<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="landscape" />
  <title>Glider Gauntlet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060618; touch-action: none; }
    #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; touch-action: none; }
    /* Landscape lock message for portrait mode */
    #rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #060618;
      color: #00ffff;
      font-family: monospace;
      font-size: 24px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    #rotate-message .icon { font-size: 60px; }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-message { display: flex; }
      #game-container { display: none; }
    }
  </style>
</head>
<body>
  <div id="rotate-message">
    <div class="icon">📱↔️</div>
    <div>Rotate your device to landscape</div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Request fullscreen and lock orientation on first touch
    document.addEventListener('touchstart', function onFirstTouch() {
      document.removeEventListener('touchstart', onFirstTouch);
      // Fullscreen
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      // Lock landscape
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(){});
      }
    }, { once: true });
  </script>
</body>
</html>
