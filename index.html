<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Glider Gauntlet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060618;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      /* Safe area insets for notch devices */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
    }
    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
    /* Portrait warning overlay */
    #rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #060618;
      color: #00ffff;
      font-family: monospace;
      font-size: 22px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 20px;
    }
    #rotate-message .icon { font-size: 48px; }
    #rotate-message .sub { font-size: 14px; color: #446666; margin-top: 8px; }
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-message { display: flex; }
    }
    /* Fullscreen button — only on Android (iOS has no fullscreen API) */
    #fs-btn {
      display: none;
      position: fixed;
      top: 8px; right: 8px;
      z-index: 9999;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid rgba(0, 255, 255, 0.5);
      color: #00ffff;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="rotate-message">
    <div class="icon">📱↔️</div>
    <div>Rotate your device to landscape</div>
    <div class="sub">Then tap to play</div>
  </div>
  <button id="fs-btn">⛶ Fullscreen</button>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    (function() {
      var fsBtn = document.getElementById('fs-btn');
      var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      // Only show fullscreen button on touch devices that support the API (Android)
      if (isTouch && !isIOS && document.documentElement.requestFullscreen) {
        fsBtn.style.display = 'block';
      }

      function goFullscreen() {
        var el = document.documentElement;
        var rfs = el.requestFullscreen || el.webkitRequestFullscreen;
        if (rfs) {
          rfs.call(el).then(function() {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function(){});
            }
            fsBtn.style.display = 'none';
          }).catch(function(){});
        }
      }

      // Direct touchend handler (more reliable than click for fullscreen)
      fsBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        goFullscreen();
      });
      fsBtn.addEventListener('click', goFullscreen);

      document.addEventListener('fullscreenchange', function() {
        if (document.fullscreenElement) {
          fsBtn.style.display = 'none';
        } else if (isTouch && !isIOS) {
          fsBtn.style.display = 'block';
        }
      });

      // iOS: show hint to add to home screen for fullscreen experience
      if (isIOS && isTouch && !window.navigator.standalone) {
        var iosHint = document.createElement('div');
        iosHint.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(0,40,40,0.9);color:#00ffff;font-family:monospace;font-size:12px;padding:8px 16px;border-radius:8px;border:1px solid rgba(0,255,255,0.3);text-align:center;white-space:nowrap;';
        iosHint.textContent = 'Tap Share ⬆ → Add to Home Screen for fullscreen';
        document.body.appendChild(iosHint);
        setTimeout(function() { iosHint.style.opacity = '0'; iosHint.style.transition = 'opacity 1s'; }, 8000);
        setTimeout(function() { iosHint.remove(); }, 9000);
      }
    })();
  </script>
</body>
</html>
